[build]
  base = "frontend"
  publish = ".next"
  command = "npm install && npm run build"

[build.environment]
  NODE_VERSION = "20"

# Plugin para converter API routes em Netlify Functions
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Configuração para Next.js com API routes
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"