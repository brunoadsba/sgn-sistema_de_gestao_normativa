[build]
  base = "frontend"
  publish = "out"
  command = "npm install && npm run build"

[build.environment]
  NODE_VERSION = "20"

# Configuração para Next.js
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"